<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Absurd Word</title>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto+Mono:wght@300;500&display=swap');

        :root {
            --bg: #050b14;
            --card: rgba(4, 12, 36, 0.88);
            --accent: #00e5ff;
            --accent-glow: rgba(0, 229, 255, 0.55);
            --text: #c2f3ff;
            --warn: #ff9900;
            --danger: #ff3333;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%; min-height: 100%;
            font-family: 'Roboto Mono', monospace;
            background: transparent;
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        html {
            background-color: #030810;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: clamp(12px, 4vw, 24px);
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
            z-index: 1;
            min-height: 100vh;
            background: transparent;
        }

        /* ── Canvas bg ── */
        #tronCanvas {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 0;
            pointer-events: none;
        }

        /* ── Main card ── */
        .container {
            width: 100%;
            max-width: 640px;
            background: var(--card);
            padding: clamp(1rem, 5vw, 2.2rem);
            border-radius: 4px;
            text-align: center;
            border: 2px solid var(--accent);
            box-shadow: 0 0 22px var(--accent-glow), inset 0 0 14px rgba(0,229,255,0.15);
            position: relative; z-index: 2;
            backdrop-filter: blur(6px);
            margin: auto;
        }

        /* ── Typography ── */
        h1 {
            font-family: 'Orbitron', sans-serif;
            color: #fff; text-transform: uppercase;
            letter-spacing: clamp(2px, 1.5vw, 6px);
            font-size: clamp(1.1rem, 5vw, 1.8rem);
            text-shadow: 0 0 15px var(--accent-glow);
            font-weight: 900;
            margin-bottom: 0.4rem;
        }

        .word {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.6rem, 9vw, 3rem);
            font-weight: 700; color: #fff;
            margin: 0.8rem 0;
            letter-spacing: clamp(2px, 2vw, 5px);
            text-shadow: 0 0 20px var(--accent-glow), 0 0 40px rgba(0,229,255,0.35);
            text-transform: uppercase;
            word-break: break-word;
        }

        /* ── Timer ── */
        .timer-box {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(0.7rem, 3vw, 1rem);
            font-weight: bold; color: #fff;
            border: 1px solid var(--accent); padding: 0.5rem 0.9rem;
            background: rgba(0,229,255,0.15); display: inline-block;
            margin-bottom: 0.9rem;
            box-shadow: 0 0 10px var(--accent-glow);
            white-space: nowrap;
        }

        /* ── Inputs ── */
        input[type="text"] {
            width: 100%; padding: 0.85rem 1rem;
            border: 1px solid var(--accent);
            background: rgba(1,5,20,0.9); color: #fff;
            font-size: clamp(0.85rem, 3.5vw, 1rem);
            margin-bottom: 0.9rem; text-align: center;
            font-family: 'Roboto Mono', monospace; border-radius: 2px;
            -webkit-appearance: none;
        }
        input[type="text"]:focus { outline: none; box-shadow: 0 0 14px var(--accent-glow); border-color: #fff; }

        /* ── Buttons ── */
        .btn {
            font-family: 'Orbitron', sans-serif;
            background: transparent; color: var(--accent);
            border: 1px solid var(--accent);
            padding: 0.85rem 1rem;
            font-size: clamp(0.7rem, 3vw, 0.95rem);
            font-weight: 700; cursor: pointer; width: 100%;
            text-transform: uppercase; letter-spacing: clamp(1px, 1vw, 3px);
            transition: all 0.25s;
            box-shadow: 0 0 5px rgba(0,229,255,0.25);
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        .btn:hover, .btn:active { background: var(--accent); color: #020613; box-shadow: 0 0 20px var(--accent-glow); }
        .btn:disabled { border-color: #004455; color: #004455; cursor: not-allowed; box-shadow: none; background: transparent; }

        /* ── Vote list ── */
        .list-group { text-align: left; margin-top: 0.8rem; }
        .list-item {
            background: rgba(0,15,40,0.6); padding: 0.85rem 1rem;
            border: 1px solid rgba(0,229,255,0.28); margin-bottom: 0.5rem;
            cursor: pointer; transition: all 0.18s; border-radius: 2px;
            font-size: clamp(0.82rem, 3vw, 0.95rem);
            line-height: 1.4;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            user-select: none;
        }
        .list-item:active { background: rgba(0,229,255,0.12); }
        @media (hover: hover) {
            .list-item:hover { background: rgba(0,229,255,0.13); border-color: var(--accent); box-shadow: 0 0 9px rgba(0,229,255,0.28); }
        }
        .voted { border-color: #fff !important; box-shadow: 0 0 14px rgba(255,255,255,0.5) !important; color: #fff; background: rgba(0,229,255,0.28) !important; }
        .wrong  { border-color: var(--danger) !important; background: rgba(255,51,51,0.12) !important; color: #ffaaaa; }

        /* ── Final reveal ── */
        .grid-final {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px; margin-top: 1.2rem;
        }
        @media (max-width: 420px) { .grid-final { grid-template-columns: 1fr; } }
        .final-box { padding: 1.1rem; border: 1px solid var(--accent); background: rgba(0,5,15,0.92); text-align: left; }
        .final-box h4 { font-family: 'Orbitron', sans-serif; margin-bottom: 0.4rem; text-transform: uppercase; color: var(--accent); font-size: 0.75rem; letter-spacing: 1px; }
        .real-box { border-color: #fff; }
        .real-box h4 { color: #fff; }
        .final-box p { font-size: clamp(0.8rem, 2.8vw, 0.9rem); line-height: 1.5; }

        /* ── Admin panel ── */
        .admin-panel {
            margin-top: 14px; padding: 10px;
            border: 1px dashed var(--warn);
            background: rgba(255,153,0,0.04);
            display: none;
        }
        .btn-admin {
            font-family: 'Orbitron', sans-serif;
            background: transparent; cursor: pointer; width: 100%;
            text-transform: uppercase; letter-spacing: 1px; transition: all 0.25s;
            border: 1px solid var(--warn); color: var(--warn);
            font-size: 0.75rem; padding: 0.5rem; margin-bottom: 6px; display: block;
            touch-action: manipulation;
        }
        .btn-admin:hover, .btn-admin:active { background: var(--warn); color: #000; }
        .btn-danger { border-color: var(--danger) !important; color: var(--danger) !important; }
        .btn-danger:hover, .btn-danger:active { background: var(--danger) !important; color: #fff !important; }

        /* ── MEMBERS leaderboard ── */
        .leaderboard {
            margin-top: 1.4rem; padding: 0.9rem 1rem;
            border: 1px solid rgba(0,229,255,0.2);
            background: rgba(0,10,30,0.72);
        }
        .leaderboard-title {
            font-family: 'Orbitron', sans-serif;
            color: var(--accent); font-size: 0.75rem;
            letter-spacing: 3px; text-transform: uppercase;
            margin-bottom: 0.7rem; text-align: left;
        }
        .leaderboard-list { padding: 0; list-style: none; }
        .leaderboard-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0.55rem 0.3rem;
            border-bottom: 1px solid rgba(0,229,255,0.08);
            font-size: clamp(0.78rem, 2.8vw, 0.88rem);
            position: relative;
        }
        .leaderboard-item:last-child { border-bottom: none; }
        .lb-name { color: var(--text); flex: 1; text-align: left; }
        .lb-pts {
            font-family: 'Orbitron', sans-serif;
            color: var(--accent); font-weight: bold;
            font-size: clamp(0.82rem, 3vw, 0.95rem);
            min-width: 60px; text-align: right;
            position: relative;
        }
        /* me badge */
        .lb-me { font-size: 0.65rem; color: rgba(0,229,255,0.6); margin-left: 4px; }

        /* ── Floating point toast ── */
        .pts-toast {
            position: fixed;
            pointer-events: none;
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.4rem, 6vw, 2rem);
            font-weight: 900;
            z-index: 9999;
            animation: toastFly 1.6s ease-out forwards;
            white-space: nowrap;
        }
        .pts-toast.correct {
            color: var(--accent);
            text-shadow: 0 0 20px var(--accent-glow), 0 0 40px rgba(0,229,255,0.5);
        }
        .pts-toast.wrong {
            color: #ff6666;
            text-shadow: 0 0 20px rgba(255,80,80,0.6);
        }
        @keyframes toastFly {
            0%   { opacity: 0; transform: translateY(0) scale(0.6); }
            15%  { opacity: 1; transform: translateY(-10px) scale(1.15); }
            60%  { opacity: 1; transform: translateY(-55px) scale(1); }
            100% { opacity: 0; transform: translateY(-100px) scale(0.85); }
        }

        /* ── Vote feedback banner ── */
        #voteFeedback {
            display: none;
            margin-top: 0.8rem; padding: 0.7rem 1rem;
            border-radius: 2px;
            font-size: clamp(0.78rem, 2.8vw, 0.88rem);
            font-family: 'Roboto Mono', monospace;
            text-align: center;
            animation: fadeInBanner 0.3s ease;
        }
        #voteFeedback.correct { border: 1px solid var(--accent); background: rgba(0,229,255,0.1); color: var(--accent); }
        #voteFeedback.wrong   { border: 1px solid var(--danger); background: rgba(255,51,51,0.1); color: #ff8888; }
        @keyframes fadeInBanner { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

        /* ── Victory overlay ── */
        #pantallaCorona {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(1,5,15,0.96); z-index: 200;
            justify-content: center; align-items: center; flex-direction: column;
            padding: 1rem;
        }
        .corona-box {
            border: 2px solid #fff; background: #020613;
            padding: clamp(1.5rem, 6vw, 3rem);
            text-align: center; width: 100%; max-width: 480px;
            box-shadow: 0 0 30px rgba(255,255,255,0.25), 0 0 15px var(--accent-glow);
        }
        .corona-titulo {
            font-family: 'Orbitron', sans-serif; color: #fff;
            letter-spacing: clamp(2px, 2vw, 5px);
            font-size: clamp(1.3rem, 6vw, 2.2rem); margin-bottom: 0.5rem;
        }
        .corona-sub { color: var(--text); letter-spacing: 1px; font-size: clamp(0.8rem, 3vw, 1rem); margin: 0.8rem 0; }
        .campeon-nombre {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.8rem, 9vw, 3.2rem);
            font-weight: bold; color: var(--accent);
            text-shadow: 0 0 20px var(--accent-glow);
            margin: 1.2rem 0; text-transform: uppercase;
            word-break: break-all;
        }

        /* ── Music button ── */
        #btnMusica {
            position: fixed; bottom: 16px; right: 16px;
            width: 46px; height: 46px; border-radius: 50%;
            background: rgba(0,15,30,0.85); border: 1px solid var(--accent);
            color: var(--accent); font-size: 1.3rem; cursor: pointer;
            z-index: 100; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 0 10px var(--accent-glow); transition: all 0.3s;
            touch-action: manipulation;
        }
        #btnMusica:hover, #btnMusica:active { background: var(--accent); color: #000; }
        #btnMusica.apagado { border-color: #444; color: #444; box-shadow: none; background: rgba(20,20,20,0.85); }

        /* ── Divider ── */
        .divider { border: none; border-top: 1px solid rgba(0,229,255,0.12); margin: 1.2rem 0; }

        /* ── Round label ── */
        .ronda-label { letter-spacing: 3px; margin-bottom: 0; color: #5577aa; font-family: 'Orbitron', sans-serif; font-size: clamp(0.65rem, 2.5vw, 0.8rem); }

        /* ── Section subtitle ── */
        .section-title {
            letter-spacing: 2px; font-size: clamp(0.7rem, 2.5vw, 0.85rem);
            color: #fff; font-family: 'Orbitron', sans-serif;
            margin-bottom: 0.3rem;
        }
    </style>
</head>
<body>

<canvas id="tronCanvas"></canvas>
<button id="btnMusica" class="apagado" title="Música">🔇</button>

<!-- Victory screen -->
<div id="pantallaCorona">
    <div class="corona-box">
        <p class="corona-titulo">CONEXIÓN FINALIZADA</p>
        <p class="corona-sub">EL JUGADOR QUE DECODIFICÓ LA RED:</p>
        <div class="campeon-nombre" id="nombreCampeon">---</div>
        <p style="color:#446;font-size:0.8rem;margin-bottom:1.2rem;font-family:monospace;">Solo el arquitecto puede reiniciar.</p>
        <button id="btnNuevoJuegoHost" class="btn" style="border-color:#fff;color:#fff;">Reiniciar Simulación</button>
        <div id="msgEsperaParticipante" style="color:#777;font-size:0.8rem;margin-top:0.6rem;font-family:monospace;">Esperando al arquitecto...</div>
    </div>
</div>

<!-- Main container -->
<div class="container">
    <h1>The Absurd Word</h1>

    <!-- Registration -->
    <div id="pantallaRegistro">
        <p style="letter-spacing:2px;color:var(--accent);font-family:'Orbitron',sans-serif;font-size:clamp(0.7rem,2.5vw,0.85rem);margin:0.8rem 0;">DEFINE TU AVATAR</p>
        <input type="text" id="inputNombre" placeholder="INGRESA TU ALIAS..." maxlength="12" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false">
        <button class="btn" id="btnRegistrar">Inicializar Conexión</button>
    </div>

    <!-- Game content (hidden until registered) -->
    <div id="contenidoJuego" style="display:none;">

        <!-- Timer -->
        <div id="seccionTiempo" class="timer-box">
            INGRESO: <span id="reloj">30</span>S
        </div>

        <!-- Word + input -->
        <div id="pantallaJuego">
            <p class="ronda-label" id="txtRonda">DATOS 1/10</p>
            <div class="word" id="pantallaPalabra">CARGANDO...</div>
            <div id="formularioEnvio">
                <input type="text" id="inputDefinicion" placeholder="TU DECODIFICACIÓN ALTERNATIVA..." autocomplete="off" autocorrect="off" spellcheck="false">
                <button class="btn" id="btnEnviar">Subir a la Red</button>
            </div>
        </div>

        <hr class="divider">

        <!-- Vote area -->
        <div id="pantallaRespuestas">
            <h3 class="section-title" id="tituloRespuestas">REGISTROS EN LA RED:</h3>
            <div class="list-group" id="contenedorRespuestas"></div>
            <div id="voteFeedback"></div>
        </div>

        <!-- Round result -->
        <div id="pantallaFinal" style="display:none;">
            <div class="grid-final">
                <div class="final-box">
                    <h4>Más votado</h4>
                    <p id="textoGanador" style="color:var(--accent);">—</p>
                </div>
                <div class="final-box real-box">
                    <h4>Dato Correcto</h4>
                    <p id="textoReal" style="color:#fff;">—</p>
                </div>
            </div>
        </div>

        <!-- MEMBERS leaderboard -->
        <div class="leaderboard">
            <div class="leaderboard-title">⬡ MEMBERS</div>
            <ul class="leaderboard-list" id="listaLeaderboard"></ul>
        </div>

        <!-- Admin panel (host only) -->
        <div id="adminPanel" class="admin-panel">
            <p style="color:var(--warn);font-size:0.72rem;margin-bottom:8px;font-family:monospace;">💻 PANEL DEL ARQUITECTO</p>
            <button class="btn-admin" id="btnSiguienteAdmin">👉 Forzar Siguiente Secuencia</button>
            <button class="btn-admin btn-danger" id="btnLimpiarJugadores">🗑️ Borrar Todos los Jugadores</button>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {

    // ══════════════════════════════════════════════════════════════════
    // FULL-SCREEN TRON ARES — RAM BUS 3D ENGINE
    // ══════════════════════════════════════════════════════════════════
    var canvas = document.getElementById('tronCanvas');
    var ctx    = canvas.getContext('2d');
    var W, H, t = 0, lastTime = 0;

    function resizeCanvas() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // ── 3-D camera ──────────────────────────────────────────────────
    // Camera looks slightly down at the bus-board from above-left.
    // World coords: X=right, Y=up, Z=into screen (depth toward RAM).
    // Camera sits at world (0, camH, camDist) looking toward origin.
    var CAM_H    = 420;   // height above floor
    var CAM_DIST = 20;    // how far back (Z) camera is from Z=0
    var FOV_D    = 700;   // focal-length in pixels

    // VP is where Z=infinity converges on screen — upper-right bias like the image
    var VPX, VPY;   // set in project() dynamically from W,H
    function project(wx, wy, wz) {
        // Simple perspective: world → camera space (camera at y=CAM_H, z=-CAM_DIST)
        var relZ = wz + CAM_DIST;
        if (relZ < 1) relZ = 1;
        var scale = FOV_D / relZ;
        // floor-Y: camera looks down, so world-Y maps to screen-Y inverted
        var camX  = wx;
        var camY  = CAM_H - wy;   // wy=0 is floor, higher = up
        // vanishing toward upper-right
        VPX = W * 0.65;
        VPY = H * 0.28;
        var sx = VPX + camX * scale;
        var sy = VPY + camY * scale;
        return { x: sx, y: sy, s: scale, valid: sy < H * 1.6 };
    }

    // ── Floor grid ──────────────────────────────────────────────────
    // Grid spans from camera forward. X spans wide, Z spans deep.
    var GRID_X_HALF = 1800;  // half-width of floor
    var GRID_Z_FAR  = 3000;  // how far the floor stretches away
    var GRID_Z_NEAR = -100;  // behind camera (clips naturally)
    var GRID_X_STEP = 120;   // column spacing
    var GRID_Z_STEP = 120;   // row spacing

    function drawFloorGrid() {
        ctx.save();
        // Vertical lines (running into depth)
        var cols = Math.ceil(GRID_X_HALF / GRID_X_STEP);
        for (var c = -cols; c <= cols; c++) {
            var wx = c * GRID_X_STEP;
            var pNear = project(wx, 0, GRID_Z_NEAR);
            var pFar  = project(wx, 0, GRID_Z_FAR);
            if (!pNear.valid && !pFar.valid) continue;
            var isBus = (c % 3 === 0);
            var alpha = isBus ? 0.22 : 0.07;
            var lw    = isBus ? 1.4  : 0.5;
            var g = ctx.createLinearGradient(pNear.x, pNear.y, pFar.x, pFar.y);
            g.addColorStop(0, 'rgba(0,200,255,' + (alpha * 1.8) + ')');
            g.addColorStop(0.5,'rgba(0,180,255,' + alpha + ')');
            g.addColorStop(1, 'rgba(0,100,200,0)');
            ctx.strokeStyle = g;
            ctx.lineWidth = lw;
            ctx.beginPath();
            ctx.moveTo(pNear.x, pNear.y);
            ctx.lineTo(pFar.x, pFar.y);
            ctx.stroke();
        }
        // Horizontal lines (cross-connects)
        var rows = Math.ceil(GRID_Z_FAR / GRID_Z_STEP);
        for (var r = 0; r <= rows; r++) {
            var wz = r * GRID_Z_STEP;
            var pLeft  = project(-GRID_X_HALF, 0, wz);
            var pRight = project( GRID_X_HALF, 0, wz);
            var prog = wz / GRID_Z_FAR;
            var alpha2 = (1 - prog) * 0.14 + 0.02;
            if (r % 5 === 0) alpha2 *= 2.5;
            ctx.strokeStyle = 'rgba(0,160,230,' + alpha2 + ')';
            ctx.lineWidth   = r % 5 === 0 ? 0.9 : 0.35;
            ctx.beginPath();
            ctx.moveTo(pLeft.x, pLeft.y);
            ctx.lineTo(pRight.x, pRight.y);
            ctx.stroke();
        }
        ctx.restore();
    }

    // ── Bus channels: raised lanes on the floor ─────────────────────
    // Each channel is a pair of parallel lines slightly above the floor.
    var BUS_CHANNELS = [-5,-3,-1,0,1,3,5].map(function(n){ return n * GRID_X_STEP; });
    var BUS_Y = 4; // slightly above floor

    function drawBusChannels() {
        ctx.save();
        BUS_CHANNELS.forEach(function(wx) {
            var inner = 18, outer = 34;
            [-1,1].forEach(function(side) {
                var x = wx + side * inner;
                var pN = project(x, BUS_Y, GRID_Z_NEAR);
                var pF = project(x, BUS_Y, GRID_Z_FAR * 0.7);
                var g = ctx.createLinearGradient(pN.x, pN.y, pF.x, pF.y);
                g.addColorStop(0, 'rgba(0,229,255,0.35)');
                g.addColorStop(0.6,'rgba(0,180,255,0.15)');
                g.addColorStop(1, 'rgba(0,100,200,0)');
                ctx.strokeStyle = g;
                ctx.lineWidth = 1.2;
                ctx.beginPath();
                ctx.moveTo(pN.x, pN.y);
                ctx.lineTo(pF.x, pF.y);
                ctx.stroke();
            });
        });
        ctx.restore();
    }

    // ── Data pulses (streaks along bus channels toward RAM) ─────────
    var pulses = [];
    function spawnPulse() {
        var busX = BUS_CHANNELS[Math.floor(Math.random() * BUS_CHANNELS.length)];
        var bright = Math.random() > 0.25;
        pulses.push({
            wx:    busX + (Math.random() - 0.5) * 8,
            wy:    BUS_Y + Math.random() * 6,
            wz:    GRID_Z_FAR * (0.3 + Math.random() * 0.7),
            speed: 400 + Math.random() * 800,
            len:   200 + Math.random() * 500,
            alpha: bright ? 0.95 : 0.35,
            width: bright ? (3 + Math.random() * 5) : 1.5,
            col:   bright
                     ? (Math.random() > 0.3 ? '#00e5ff' : '#40f0ff')
                     : (Math.random() > 0.5 ? '#0077cc' : '#005599')
        });
    }
    for (var _i = 0; _i < 60; _i++) spawnPulse();

    function drawPulse(p) {
        var pH = project(p.wx, p.wy, p.wz);
        var pT = project(p.wx, p.wy, Math.min(GRID_Z_FAR, p.wz + p.len));
        if (!pH.valid) return;
        // gradient from bright head to transparent tail
        var gx = ctx.createLinearGradient(pH.x, pH.y, pT.x, pT.y);
        var c0 = p.col, ca = p.alpha;
        gx.addColorStop(0,   hexToRgba(c0, ca));
        gx.addColorStop(0.2, hexToRgba(c0, ca * 0.7));
        gx.addColorStop(1,   hexToRgba(c0, 0));
        ctx.strokeStyle = gx;
        ctx.lineWidth = Math.max(0.5, p.width * pH.s * 0.012);
        ctx.shadowBlur  = p.alpha > 0.7 ? 18 : 5;
        ctx.shadowColor = p.col;
        ctx.beginPath(); ctx.moveTo(pH.x, pH.y); ctx.lineTo(pT.x, pT.y); ctx.stroke();
        ctx.shadowBlur = 0;
        // white hot head
        if (p.alpha > 0.6) {
            var r2 = Math.max(1.5, p.width * pH.s * 0.018);
            ctx.beginPath(); ctx.arc(pH.x, pH.y, r2, 0, Math.PI * 2);
            ctx.fillStyle = '#cff9ff';
            ctx.shadowBlur = 20; ctx.shadowColor = '#00e5ff';
            ctx.fill(); ctx.shadowBlur = 0;

            wy: BUS_Y,

    function drawHPulse(p) {
        var pH = project(p.wx, p.wy, p.wz);
        var pT = project(p.wx - p.dir * p.len, p.wy, p.wz);
        if (!pH.valid) return;
        var gx = ctx.createLinearGradient(pT.x, pT.y, pH.x, pH.y);
        gx.addColorStop(0, hexToRgba(p.col, 0));
        gx.addColorStop(1, hexToRgba(p.col, p.alpha));
        ctx.strokeStyle = gx;
        ctx.lineWidth = Math.max(0.4, p.width * pH.s * 0.01);
        ctx.shadowBlur = 8; ctx.shadowColor = p.col;

        ctx.shadowBlur = 0;

    // ── RAM module (upper-right, destination of all buses) ───────────
    function drawRAM() {

        ctx.fillStyle = gr;

        // Main body
        ctx.fillStyle   = 'rgba(2,10,32,0.9)';

        [rx + rw * 0.04, rx + rw * 0.52].forEach(function(panX, pi) {
            ctx.fillStyle   = 'rgba(0,8,28,0.95)';
            ctx.strokeStyle = 'rgba(0,180,255,0.4)';
            ctx.lineWidth   = 0.8;
            ctx.fillRect(panX, panY, panW, panH);
            ctx.strokeRect(panX, panY, panW, panH);
            // cell rows
            var rows = 14, cols = 4;
            var cw2 = (panW - 6) / cols, ch2 = (panH - 6) / rows;
            for (var rr = 0; rr < rows; rr++) {
                for (var cc = 0; cc < cols; cc++) {
                    var cx3 = panX + 3 + cc * cw2;
                    var cy3 = panY + 3 + rr * ch2;
                    var gv  = (Math.sin(t * 4 + rr * 0.8 + cc * 1.3 + pi * 2.1) + 1) / 2;
                    var bv  = (Math.sin(t * 2.5 + rr * 0.5 + pi) + 1) / 2 * 0.4;
                    ctx.fillStyle = 'rgba(' + Math.floor(bv*60) + ',' +
                        Math.floor(100 + gv * 129) + ',' +
                        Math.floor(180 + gv * 75) + ',' +

            ctx.fillStyle = 'rgba(0,229,255,0.7)';

        ctx.font        = 'bold ' + Math.floor(rw * 0.1) + 'px "Orbitron",sans-serif';
        ctx.fillStyle   = '#ffffff';
        ctx.textAlign   = 'center';
        ctx.fillText('*', rx + rw / 2, ry - 14);
        ctx.font        = Math.floor(rw * 0.078) + 'px "Roboto Mono",monospace';
        ctx.fillStyle   = 'rgba(0,229,255,0.9)';

            var busScreenPt = project(busWx, BUS_Y, 20);

            grad2.addColorStop(0, 'rgba(0,229,255,0.5)');

    // ── Side structures (circuit buildings left/right) ───────────────
    function drawSideStructures() {
        ctx.save();
        // Small glowing rectangular structures on grid edge
        var structs = [
            {wx:-900, wz:400,  wy:0, ww:180, wh:60},
            {wx:-700, wz:800,  wy:0, ww:120, wh:40},
            {wx: 800, wz:350,  wy:0, ww:150, wh:50},
            {wx: 600, wz:900,  wy:0, ww:200, wh:70},
            {wx:-1100,wz:1200, wy:0, ww:100, wh:35},
            {wx: 950, wz:1400, wy:0, ww:140, wh:45},
        ];
        structs.forEach(function(s) {
            var pBL = project(s.wx,         s.wy,      s.wz);
            var pBR = project(s.wx + s.ww,  s.wy,      s.wz);
            var pTL = project(s.wx,         s.wy+s.wh, s.wz);
            var pTR = project(s.wx + s.ww,  s.wy+s.wh, s.wz);
            if (!pBL.valid) return;
            var glow = (Math.sin(t * 1.5 + s.wz * 0.003) + 1) / 2;
            ctx.fillStyle   = 'rgba(0,' + Math.floor(20 + glow*40) + ',' + Math.floor(60 + glow*60) + ',0.55)';

            ctx.lineWidth   = 0.8;
            ctx.beginPath();
            ctx.moveTo(pBL.x, pBL.y);
            ctx.lineTo(pBR.x, pBR.y);
            ctx.lineTo(pTR.x, pTR.y);
            ctx.lineTo(pTL.x, pTL.y);
            ctx.closePath();
            ctx.fill(); ctx.stroke();
        });
        ctx.restore();
    }

    // ── Curved loop structures (TRON lightcycle curves) ─────────────
    // In the image the buses curve with rounded corners before straightening.
    // We draw curved arcs projected onto the floor.
    function drawCurvedBuses() {
        ctx.save();
        var loops = [
            {cx:-360, cz:600, r:240, a0: Math.PI, a1: Math.PI*1.5},
            {cx:-360, cz:600, r:360, a0: Math.PI, a1: Math.PI*1.5},
            {cx:-360, cz:600, r:480, a0: Math.PI, a1: Math.PI*1.5},
            {cx: 360, cz:900, r:200, a0: 0,        a1: Math.PI*0.5},
        ];
        loops.forEach(function(lp) {
            var steps = 48;
            var pts = [];
            for (var si = 0; si <= steps; si++) {
                var angle = lp.a0 + (lp.a1 - lp.a0) * si / steps;
                var wx = lp.cx + Math.cos(angle) * lp.r;
                var wz = lp.cz + Math.sin(angle) * lp.r;
                var p = project(wx, BUS_Y, wz);
                if (p.valid) pts.push(p);
            }
            if (pts.length < 2) return;
            var g = ctx.createLinearGradient(pts[0].x, pts[0].y, pts[pts.length-1].x, pts[pts.length-1].y);
            g.addColorStop(0,   'rgba(0,200,255,0.25)');
            g.addColorStop(0.5, 'rgba(0,229,255,0.18)');
            g.addColorStop(1,   'rgba(0,100,200,0.05)');

            ctx.lineWidth   = 1.5;
            ctx.shadowBlur  = 6; ctx.shadowColor = '#00c8ff';
            ctx.beginPath();
            ctx.moveTo(pts[0].x, pts[0].y);
            for (var pi2 = 1; pi2 < pts.length; pi2++) ctx.lineTo(pts[pi2].x, pts[pi2].y);
            ctx.stroke();
            ctx.shadowBlur = 0;
        });
        ctx.restore();
    }

    // ── Utility: hex color → rgba string ────────────────────────────
    function hexToRgba(hex, alpha) {
        var r = parseInt(hex.slice(1,3),16);

        var b2= parseInt(hex.slice(5,7),16);
        return 'rgba('+r+','+g2+','+b2+','+alpha+')';

    // ── Main render loop ─────────────────────────────────────────────
    function render(now) {
        var dt = Math.min((now - lastTime) / 1000, 0.05);
        lastTime = now;
        t += dt;

        // 1. Background atmosphere
        drawAtmosphere();

        // 2. Floor grid
        drawFloorGrid();

        // 3. Side circuit structures
        drawSideStructures();

        // 4. Curved bus loops
        drawCurvedBuses();

        // 5. Bus channel rails
        drawBusChannels();

        // 6. Update + draw data pulses (vertical)
        for (var i = pulses.length - 1; i >= 0; i--) {
            var p = pulses[i];
            p.wz -= p.speed * dt;
            if (p.wz + p.len < 0) { pulses.splice(i, 1); spawnPulse(); continue; }
            drawPulse(p);
        }

        // 7. Update + draw address pulses (horizontal)
        for (var j = hPulses.length - 1; j >= 0; j--) {
            var hp = hPulses[j];
            hp.wx += hp.dir * hp.speed * dt;
            var gone = hp.dir > 0 ? hp.wx > GRID_X_HALF + 400 : hp.wx < -GRID_X_HALF - 400;
            if (gone) { hPulses.splice(j, 1); spawnHPulse(); continue; }
            drawHPulse(hp);
        }

        // 8. RAM module (drawn last, on top)
        drawRAM();

        requestAnimationFrame(render);
    }
    requestAnimationFrame(render);

        // Position near the voted element or center of screen
        var x, y;
        if (originEl) {
            var rect = originEl.getBoundingClientRect();
            x = rect.left + rect.width / 2;
            y = rect.top + rect.height / 2;
        } else {
            x = window.innerWidth / 2;
            y = window.innerHeight / 2;
        }

        toast.style.left = (x - 40) + 'px';
        toast.style.top  = y + 'px';
        document.body.appendChild(toast);

        toast.addEventListener('animationend', function () {
            if (toast.parentNode) toast.parentNode.removeChild(toast);

        });

        // MEMBERS: only show players that exist in Firebase (registered ones)
        db.ref('partida/jugadores').on('value', function (snap) {
            var lista = document.getElementById('listaLeaderboard');
            lista.innerHTML = '';

            if (!snap.exists() || !snap.hasChildren()) {
                var empty = document.createElement('li');
                empty.style.cssText = 'color:#334;font-size:0.78rem;padding:0.5rem 0;text-align:center;';
                empty.innerText = 'Sin agentes conectados.';
                lista.appendChild(empty);
                return;
            }

            var jugadores = [];
            snap.forEach(function (c) {
                var j = c.val();
                if (j && j.nombre) { jugadores.push({ id: c.key, nombre: j.nombre, puntos: j.puntos || 0 }); }
            });
            jugadores.sort(function (a, b) { return b.puntos - a.puntos; });

            jugadores.forEach(function (j, idx) {
                var li = document.createElement('li');
                li.className = 'leaderboard-item';
                li.id = 'lb-' + j.id;

                var rankEmoji = idx === 0 ? '🥇 ' : idx === 1 ? '🥈 ' : idx === 2 ? '🥉 ' : (idx + 1) + '. ';
                var meTag = j.id === miID ? '<span class="lb-me">YOU</span>' : '';

                li.innerHTML =
                    '<span class="lb-name">' + rankEmoji + j.nombre + meTag + '</span>' +
                    '<span class="lb-pts" id="pts-' + j.id + '">' + j.puntos + ' PTS</span>';
                lista.appendChild(li);
            });
        });
    }

    function prepararNuevasPalabras() {
        var mezcladas = banco.slice().sort(function () { return 0.5 - Math.random(); });
        db.ref('partida/palabrasActuales').set(mezcladas.slice(0, 10));
    }

    function limpiarJugadores() {
        if (!soyHost) return;
        if (!confirm('Borrar TODOS los jugadores? Esta accion no se puede deshacer.')) return;
        db.ref('partida/jugadores').remove().then(function () {
            db.ref('partida/jugadores/' + miID).set({ nombre: miNombre, puntos: 0 });
            db.ref('partida/rondas').remove();
            prepararNuevasPalabras();
            db.ref('partida/ronda').set(1);
        });
    }

    // ── ROUND UI ──────────────────────────────────────────────────────────
    function cargarRondaUI() {
        clearInterval(intervalo);
        if (!palabrasDeLaPartida || !palabrasDeLaPartida.length) return;
        var pw = palabrasDeLaPartida[rondaActual - 1];

        document.getElementById('txtRonda').innerText = 'DATOS ' + rondaActual + '/10';
        document.getElementById('pantallaPalabra').innerText = pw.p;

        var elDef = document.getElementById('inputDefinicion');
        elDef.disabled = false; elDef.value = '';
        elBtnEnviar.disabled = false; elBtnEnviar.innerText = 'Subir a la Red';

        document.getElementById('formularioEnvio').style.display = 'block';
        document.getElementById('contenedorRespuestas').innerHTML = '';
        document.getElementById('pantallaFinal').style.display = 'none';
        document.getElementById('pantallaJuego').style.display = 'block';
        document.getElementById('pantallaRespuestas').style.display = 'block';
        elFeedback.style.display = 'none';
        elFeedback.className = '';

        var et = document.getElementById('seccionTiempo');
        et.style.display = 'inline-block';
        et.innerHTML = "INGRESO: <span id='reloj'>30</span>S";
        et.style.background = 'rgba(0,229,255,0.15)';
        et.style.borderColor = 'var(--accent)';

        document.getElementById('tituloRespuestas').innerText = 'REGISTROS EN LA RED:';
        document.getElementById('tituloRespuestas').style.color = '#fff';

        tiempo = 45; votoEmitido = false;

        intervalo = setInterval(function () {
            tiempo--;
            var reloj = document.getElementById('reloj');
            if (tiempo > 15) {
                if (reloj) reloj.innerText = (tiempo - 15);
            } else if (tiempo > 0) {
                pasarAVotacion();
                if (reloj) reloj.innerText = tiempo;
            } else {
                clearInterval(intervalo);
                revelarGanadorLocal();
            }
        }, 1000);
    }

    function pasarAVotacion() {
        var fe = document.getElementById('formularioEnvio');
        if (fe.style.display === 'none') return;
        var et = document.getElementById('seccionTiempo');
        et.innerHTML = "VOTACIÓN: <span id='reloj'>15</span>S";
        et.style.background = 'rgba(255,255,255,0.08)';
        et.style.borderColor = '#fff';
        document.getElementById('tituloRespuestas').innerText = 'DETECTA EL REGISTRO CORRECTO:';
        fe.style.display = 'none';
        cargarRespuestasParaVotar();
    }

    function enviarDefinicion() {
        var texto = document.getElementById('inputDefinicion').value.trim();
        var bad = ['', 'undefined', 'edu', 'hello', 'confieso'];
        if (bad.indexOf(texto.toLowerCase()) !== -1) return;
        db.ref('partida/rondas/' + rondaActual + '/respuestas').push({ texto: texto, autorId: miID });
        document.getElementById('inputDefinicion').disabled = true;
        elBtnEnviar.disabled = true;
        elBtnEnviar.innerText = 'SUBIDO — ESPERANDO...';
    }

    function cargarRespuestasParaVotar() {
        db.ref('partida/rondas/' + rondaActual + '/respuestas').once('value', function (snap) {
            var contenedor = document.getElementById('contenedorRespuestas');
            contenedor.innerHTML = '';
            var arr = [], seen = {};
            var bad = ['', 'undefined', 'edu', 'hello', 'confieso'];
            snap.forEach(function (c) {
                var info = c.val(), t = (info.texto || '').trim(), k = t.toLowerCase();
                if (bad.indexOf(k) === -1 && !seen[k]) { arr.push({ id: c.key, data: info }); seen[k] = true; }
            });
            var pw = palabrasDeLaPartida[rondaActual - 1];
            if (!seen[pw.r.toLowerCase()]) { arr.push({ id: 'correcta', data: { texto: pw.r, autorId: 'SISTEMA' } }); }
            arr.sort(function () { return 0.5 - Math.random(); });

            arr.forEach(function (item) {
                var data = item.data;
                var div = document.createElement('div');
                div.className = 'list-item';
                div.innerText = data.texto;

                div.addEventListener('click', function () {
                    if (data.autorId === miID) {
                        // Brief inline flash instead of alert
                        div.style.borderColor = 'var(--warn)';
                        setTimeout(function () { div.style.borderColor = ''; }, 800);
                        return;
                    }
                    if (votoEmitido) return;
                    votoEmitido = true;

                    // Disable all items
                    document.querySelectorAll('.list-item').forEach(function (el) { el.style.cursor = 'not-allowed'; });

                    if (data.autorId === 'SISTEMA') {
                        // Correct answer
                        div.className = 'list-item voted';
                        db.ref('partida/jugadores/' + miID + '/puntos').transaction(function (p) { return (p || 0) + 2; });

                        mostrarToast('+2 PTS', true, div);

                        elFeedback.className = 'correct';
                        elFeedback.innerText = '✓ REGISTRO VERIFICADO — +2 PUNTOS DE CONEXIÓN';
                        elFeedback.style.display = 'block';
                    } else {
                        // Wrong answer
                        div.className = 'list-item wrong';
                        db.ref('partida/jugadores/' + data.autorId + '/puntos').transaction(function (p) { return (p || 0) + 1; });

                        mostrarToast('+0 PTS', false, div);

                        elFeedback.className = 'wrong';
                        elFeedback.innerText = '✗ REGISTRO ERRÓNEO — SIN PUNTOS. +1 AL CREADOR.';
                        elFeedback.style.display = 'block';
                    }
                });

                contenedor.appendChild(div);
            });
        });
    }

    function revelarGanadorLocal() {
        document.getElementById('pantallaJuego').style.display = 'none';
        document.getElementById('pantallaRespuestas').style.display = 'none';
        document.getElementById('seccionTiempo').style.display = 'none';
        document.getElementById('textoGanador').innerText = 'Análisis completado.';
        document.getElementById('textoReal').innerText = palabrasDeLaPartida[rondaActual - 1].r;
        document.getElementById('pantallaFinal').style.display = 'block';
        if (soyHost) { setTimeout(pasarSiguienteRonda, 5000); }
    }

    function pasarSiguienteRonda() {
        if (rondaActual < 10) { db.ref('partida/ronda').set(rondaActual + 1); }
        else { declararCampeon(); }
    }

    function declararCampeon() {
        db.ref('partida/jugadores').once('value', function (snap) {
            var max = -1, campeon = 'Nadie';
            snap.forEach(function (c) { var j = c.val(); if (j.puntos > max) { max = j.puntos; campeon = j.nombre; } });
            document.getElementById('nombreCampeon').innerText = campeon;
            elCorona.style.display = 'flex';
        });
    }

    function reiniciarPartidaCompleta() {
        if (!soyHost) return;
        db.ref('partida/jugadores').once('value', function (snap) {
            snap.forEach(function (c) { db.ref('partida/jugadores/' + c.key + '/puntos').set(0); });
            db.ref('partida/rondas').remove();
            prepararNuevasPalabras();
            db.ref('partida/ronda').set(1);
        });
    }

    // ── ATMOSPHERIC MUSIC ─────────────────────────────────────────────────
    function crearRuido(ctx, gain) {
        var buf = ctx.createBuffer(1, ctx.sampleRate * 4, ctx.sampleRate);
        var data = buf.getChannelData(0);
        for (var i = 0; i < data.length; i++) { data[i] = Math.random() * 2 - 1; }
        var src = ctx.createBufferSource(); src.buffer = buf; src.loop = true;
        var lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 180; lp.Q.value = 0.8;
        var hp = ctx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 40;
        var ng = ctx.createGain(); ng.gain.value = 0.04;
        src.connect(lp); lp.connect(hp); hp.connect(ng); ng.connect(gain); src.start(); return src;
    }

    function crearDron(ctx, gain, freq, vol, lfoHz, lfoD) {
        var osc = ctx.createOscillator(); osc.type = 'sawtooth'; osc.frequency.value = freq;
        var og = ctx.createGain(); og.gain.value = vol;
        var lfo = ctx.createOscillator(); lfo.type = 'sine'; lfo.frequency.value = lfoHz;
        var lg = ctx.createGain(); lg.gain.value = lfoD;
        lfo.connect(lg); lg.connect(og.gain); lfo.start();
        var flt = ctx.createBiquadFilter(); flt.type = 'lowpass'; flt.frequency.value = freq * 3.5; flt.Q.value = 1.2;
        osc.connect(flt); flt.connect(og); og.connect(gain); osc.start();
        oscillators.push(osc); lfoNodes.push(lfo);
    }

    function crearPad(ctx, gain, freq, vol) {
        var o1 = ctx.createOscillator(); o1.type = 'sine'; o1.frequency.value = freq;
        var o2 = ctx.createOscillator(); o2.type = 'sine'; o2.frequency.value = freq * 1.5;
        var o3 = ctx.createOscillator(); o3.type = 'triangle'; o3.frequency.value = freq * 0.5;
        var pg = ctx.createGain(); pg.gain.value = vol;
        var del = ctx.createDelay(3.0); del.delayTime.value = 0.6;
        var fb = ctx.createGain(); fb.gain.value = 0.55; del.connect(fb); fb.connect(del);
        var flt = ctx.createBiquadFilter(); flt.type = 'lowpass'; flt.frequency.value = 900; flt.Q.value = 0.5;
        var lfo = ctx.createOscillator(); lfo.type = 'sine'; lfo.frequency.value = 0.07;
        var lg = ctx.createGain(); lg.gain.value = freq * 0.008;
        lfo.connect(lg); lg.connect(o1.frequency); lg.connect(o2.frequency); lfo.start();
        [o1, o2, o3].forEach(function (o) { o.connect(flt); o.start(); oscillators.push(o); });
        lfoNodes.push(lfo);
        flt.connect(pg); pg.connect(gain); pg.connect(del); del.connect(gain);
    }

    function iniciarMusica() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain();
        masterGain.gain.setValueAtTime(0, audioCtx.currentTime);
        masterGain.gain.linearRampToValueAtTime(0.7, audioCtx.currentTime + 4);
        masterGain.connect(audioCtx.destination);
        crearDron(audioCtx, masterGain, 55,   0.09, 0.03, 0.015);
        crearDron(audioCtx, masterGain, 82.4, 0.06, 0.05, 0.010);
        crearDron(audioCtx, masterGain, 110,  0.05, 0.07, 0.008);
        crearPad(audioCtx, masterGain, 220,   0.04);
        crearPad(audioCtx, masterGain, 293.7, 0.03);
        crearPad(audioCtx, masterGain, 164.8, 0.025);
        noiseNode = crearRuido(audioCtx, masterGain);
    }

    function detenerMusica() {
        if (!audioCtx) return;
        masterGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 2);
        setTimeout(function () {
            oscillators.forEach(function (o) { try { o.stop(); } catch (e) {} });
            lfoNodes.forEach(function (l) { try { l.stop(); } catch (e) {} });
            if (noiseNode) { try { noiseNode.stop(); } catch (e) {} }
            audioCtx.close();
            audioCtx = null; masterGain = null; oscillators = []; lfoNodes = []; noiseNode = null;
        }, 2200);
    }

    function conmutarMusica() {
        if (!musicaActiva) {
            iniciarMusica(); musicaActiva = true;
            elBtnMusica.innerText = '🔊'; elBtnMusica.classList.remove('apagado');
        } else {
            detenerMusica(); musicaActiva = false;
            elBtnMusica.innerText = '🔇'; elBtnMusica.classList.add('apagado');
        }
    }

}); // end DOMContentLoaded
</script>
